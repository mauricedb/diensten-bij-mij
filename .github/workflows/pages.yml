# Builds the static site with Vite + Tailwind and deploys to GitHub Pages.
# Repository Settings → Pages: set Source to "GitHub Actions".
# Public URL: https://mauricedb.github.io/diensten-bij-mij/ — matches Vite `base` in vite.config.mjs.
#
# pnpm version: omit `version` on pnpm/action-setup so it uses `packageManager` in package.json only.

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and build
        run: |
          pnpm install --frozen-lockfile
          pnpm run build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
